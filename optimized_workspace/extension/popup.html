<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AegisX Guardian</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: 'Inter', sans-serif;
      background: #07090f;
      color: #f0f4f8;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 1.25rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 12px;
    }
    .header svg { color: #06b6d4; }
    .status-card {
      background: rgba(18, 22, 35, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .status-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .status-text {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .safe { color: #10b981; }
    .warning { color: #f59e0b; }
    .danger { color: #ef4444; }
    .details {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: 4px;
    }
    .footer {
      font-size: 0.75rem;
      color: #64748b;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
    AegisX
  </div>
  <div class="status-card">
    <div id="statusIcon" class="status-icon">⏳</div>
    <div id="statusText" class="status-text">Analyzing Page...</div>
    <div id="statusDetails" class="details">Awaiting AI scan results.</div>
  </div>
  <div class="footer">
    Real-time protection active.
  </div>
  <script src="popup.js"></script>
</body>
</html>
